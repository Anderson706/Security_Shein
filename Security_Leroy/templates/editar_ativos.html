{% extends 'base.html' %}

{% block body %}
<div class="min-vh-100 d-flex align-items-start"
     style="
       position:relative;
       background:#ffffff;
       padding-top:120px;
       padding-bottom:70px;
     ">

  <!-- Logo fixo no rodapé direito -->
  <img src="{{ url_for('static', filename='leroy_secu.png') }}"
       alt="Logo DHL"
       style="
         position:fixed; right:16px; bottom:16px;
         height:170px; width:auto; z-index:10;
         opacity:.9;
       ">

  <div class="container position-relative py-4" style="z-index:5; max-width:820px;">
    <div class="row justify-content-center">
      <div class="col-12">

        <!-- TÍTULO -->
        <div class="text-center mb-3">
          <h1 style="color:#1f7f3b; font-weight:800;">
            Editar Ativos
          </h1>
          <hr style="border-color:#1f7f3b; max-width:280px; margin:.4rem auto;">
        </div>

        <!-- CARD PRINCIPAL -->
        <div class="card border-0 shadow"
             style="
               background:#ffffff;
               border-radius:16px;
               border:2px solid #1f7f3b;
             ">

          <!-- Cabeçalho -->
          <div style="
                background:#78BE20;
                border-radius:14px 14px 0 0;
                padding:12px 16px;
                border-bottom:2px solid #145c2a;
          ">
            <h5 class="mb-0"
                style="color:#ffffff; font-weight:800;">
              Editar Ativo
            </h5>
          </div>

          <div class="card-body p-4" style="color:#222;">

            <!-- BUSCA POR CPF -->
            <form method="GET"
                  action="{{ url_for('editar_ativos') }}"
                  class="border rounded-3 p-3 mb-4"
                  style="border-color:#cfe7da; background:#f6fbf8;">
              <label class="form-label fw-semibold" style="color:#1f7f3b;">
                Buscar cadastro por CPF
              </label>
              <div class="input-group">
                <input type="text"
                       name="cpf"
                       class="form-control"
                       placeholder="Digite o CPF"
                       value="{{ cpf_busca or '' }}">
                <button type="submit"
                        class="btn"
                        style="background:#78BE205; color:#ffffff; font-weight:700;">
                  Buscar
                </button>
              </div>
            </form>

            <!-- FORM EDIÇÃO -->
            <form method="POST"
                  action="{{ url_for('editar_ativo', ativo_id=ativo_edit.id) if ativo_edit else '' }}"
                  enctype="multipart/form-data">

              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

              <fieldset {% if not ativo_edit %}disabled{% endif %}>

                <div class="mb-3">
                  <label class="form-label fw-semibold" style="color:#1f7f3b;">
                    Ativo selecionado
                  </label>
                  <input type="text"
                         class="form-control"
                         readonly
                         value="{% if ativo_edit %}ID {{ ativo_edit.id }} · {{ ativo_edit.imei_ou_numero }}{% else %}Nenhum ativo selecionado{% endif %}">
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold" style="color:#1f7f3b;">
                    Tipo de ativo
                  </label>
                  <select name="tipo_ativo" class="form-select">
                    {% set tipo_sel = ativo_edit.tipo if ativo_edit else '' %}
                    <option value="Notebook" {% if tipo_sel == 'Notebook' %}selected{% endif %}>Notebook</option>
                    <option value="Desktop" {% if tipo_sel == 'Desktop' %}selected{% endif %}>Desktop</option>
                    <option value="Celular" {% if tipo_sel == 'Celular' %}selected{% endif %}>Celular</option>
                    <option value="Tablet" {% if tipo_sel == 'Tablet' %}selected{% endif %}>Tablet</option>
                    <option value="Impressora" {% if tipo_sel == 'Impressora' %}selected{% endif %}>Impressora</option>
                    <option value="Acessório" {% if tipo_sel == 'Acessório' %}selected{% endif %}>Acessório</option>
                    <option value="Outro" {% if tipo_sel == 'Outro' %}selected{% endif %}>Outro</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold" style="color:#1f7f3b;">
                    Observações
                  </label>
                  <textarea name="observacoes"
                            class="form-control"
                            rows="3">{{ ativo_edit.observacoes if ativo_edit }}</textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold" style="color:#1f7f3b;">
                    Adicionar novas fotos
                  </label>
                  <input type="file"
                         name="fotos"
                         class="form-control"
                         multiple>
                </div>

                <div class="d-flex gap-2">
                  <button type="submit"
                          class="btn"
                          style="background:#78BE20; color:#fff; font-weight:800; border-radius:999px;">
                    Salvar alterações
                  </button>
                  <a href="{{ url_for('editar_ativos') }}"
                     class="btn btn-outline-secondary"
                     style="border-radius:999px;">
                    Limpar seleção
                  </a>
                </div>

              </fieldset>
            </form>

          </div>

          <!-- Rodapé -->
          <div style="
                background:#eaf5ef;
                color:#1f7f3b;
                font-size:.75rem;
                text-align:center;
                padding:6px 10px;
                border-radius:0 0 14px 14px;
                border-top:1px solid #cfe7da;
          ">
            DHL SECURITY · EDIÇÃO DE ATIVOS
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
