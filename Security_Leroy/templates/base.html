<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Security</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">

    {% block head %}
    {% endblock %}

    <style>
      :root{
        --dhl-yellow:#ffcc00;
        --dhl-red:#d40511;
        --dhl-red-dark:#b3030e;
        --dhl-black:#1f1f1f;
        --dhl-text:#222;
        --dhl-muted:#6b7280;
        --dhl-border:#e5e7eb;
        --dhl-bg:#f4f5f7;
        --dhl-card:#ffffff;
        --dhl-shadow:0 8px 22px rgba(0,0,0,.08);
        --dhl-radius:18px;
      }

      *{
        box-sizing:border-box;
      }

      html, body{
        margin:0;
        padding:0;
      }

      body{
        min-height:100vh;
        font-family:Arial, Helvetica, sans-serif;
        color:var(--dhl-text);
        background:
          radial-gradient(circle at top right, rgba(255,204,0,.16), transparent 18%),
          linear-gradient(180deg, #fafafa 0%, var(--dhl-bg) 100%);
      }

      /* ===== Faixa fina superior no padrão do exemplo ===== */
      .top-accent{
        height:8px;
        width:100%;
        background:linear-gradient(
          90deg,
          var(--dhl-red) 0%,
          var(--dhl-red) 22%,
          var(--dhl-yellow) 22%,
          var(--dhl-yellow) 100%
        );
        box-shadow:0 2px 8px rgba(0,0,0,.08);
      }

      /* ===== Área padrão das páginas ===== */
      .page-shell{
        width:min(1100px, calc(100vw - 24px));
        margin:18px auto 24px;
      }

      /* ===== ALERTAS ===== */
      .flash-wrap{
        width:min(1100px, calc(100vw - 24px));
        margin:16px auto 0;
      }

      .alert{
        border:none;
        border-radius:14px;
        box-shadow:0 6px 14px rgba(0,0,0,.06);
        padding:14px 16px;
        font-weight:500;
      }

      .alert-success{
        background:#edf9f0;
        color:#166534;
        border-left:5px solid #22c55e;
      }

      .alert-danger{
        background:#fff1f2;
        color:#b42318;
        border-left:5px solid #ef4444;
      }

      .alert-warning{
        background:#fff8e6;
        color:#92400e;
        border-left:5px solid var(--dhl-yellow);
      }

      .alert-info{
        background:#eff6ff;
        color:#1d4ed8;
        border-left:5px solid #3b82f6;
      }

      /* ===== NAVBAR harmonizada ===== */
      .dhl-navbar{
        background:var(--dhl-yellow);
        border-bottom:1px solid rgba(0,0,0,.08);
        box-shadow:0 2px 8px rgba(0,0,0,.08);
        padding:.75rem 0;
      }

      .dhl-navbar-inner{
        max-width:1100px;
        margin:0 auto;
        padding:0 16px;
      }

      .dhl-navbar .navbar-brand{
        display:flex;
        align-items:center;
        gap:12px;
        text-decoration:none;
        margin-right:16px;
      }

      .dhl-navbar .navbar-brand img{
        height:42px;
        width:auto;
        display:block;
      }

      .dhl-brand-text{
        display:flex;
        flex-direction:column;
        line-height:1.1;
      }

      .dhl-brand-text strong{
        color:#111;
        font-size:1rem;
        font-weight:800;
        letter-spacing:.01em;
      }

      .dhl-brand-text small{
        color:#5a5a5a;
        font-size:.74rem;
        font-weight:600;
      }

      .dhl-menu-btn{
        background:var(--dhl-red);
        color:#fff !important;
        border-radius:999px;
        padding:.55rem 1rem !important;
        font-weight:700;
        border:1px solid var(--dhl-red-dark);
        transition:.2s ease;
      }

      .dhl-menu-btn:hover,
      .dhl-menu-btn:focus{
        background:var(--dhl-red-dark);
        color:#fff !important;
      }

      .dhl-dropdown{
        border:none;
        border-radius:14px;
        padding:.45rem 0;
        min-width:250px;
        overflow:hidden;
        box-shadow:0 10px 24px rgba(0,0,0,.10);
      }

      .dhl-dropdown .dropdown-item{
        padding:.68rem 1rem;
        font-size:.92rem;
        color:#222;
        font-weight:500;
      }

      .dhl-dropdown .dropdown-item:hover{
        background:#fff7d6;
        color:#000;
      }

      .dhl-btn-outline{
        border:1px solid var(--dhl-red-dark);
        color:var(--dhl-red-dark);
        background:#fff7f7;
        border-radius:999px;
        font-weight:700;
        padding:.5rem .95rem;
      }

      .dhl-btn-outline:hover{
        background:#ffe7e7;
        color:#8f0009;
      }

      .dhl-btn-solid{
        background:var(--dhl-red);
        color:#fff;
        border-radius:999px;
        font-weight:700;
        padding:.5rem 1rem;
        border:1px solid var(--dhl-red-dark);
      }

      .dhl-btn-solid:hover{
        background:var(--dhl-red-dark);
        color:#fff;
      }

      .dhl-toggler{
        border:1px solid rgba(0,0,0,.15);
        border-radius:10px;
        padding:.35rem .55rem;
      }

      .dhl-toggler:focus{
        box-shadow:none;
      }

      .navbar-toggler-icon{
        filter:invert(1);
      }

      /* ===== Cards padrão reutilizáveis ===== */
      .dhl-card{
        background:var(--dhl-card);
        border:1px solid var(--dhl-border);
        border-radius:var(--dhl-radius);
        box-shadow:var(--dhl-shadow);
      }

      .dhl-card-header{
        padding:18px 20px;
        border-bottom:1px solid var(--dhl-border);
        background:linear-gradient(180deg,#fff,#fffef8);
      }

      .dhl-card-body{
        padding:20px;
      }

      /* ===== Tipografia base ===== */
      h1, h2, h3, h4, h5, h6{
        color:var(--dhl-black);
        font-weight:800;
      }

      p{
        color:var(--dhl-text);
      }

      small, .text-muted{
        color:var(--dhl-muted) !important;
      }

      /* ===== Links ===== */
      a{
        transition:.2s ease;
      }

      a:hover{
        text-decoration:none;
      }

      /* ===== Footer opcional de página ===== */
      .page-footer-note{
        width:min(1100px, calc(100vw - 24px));
        margin:0 auto 24px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
        color:var(--dhl-muted);
        font-size:12px;
      }

      .page-footer-badge{
        background:#fff8db;
        color:#7a5a00;
        border:1px solid #f5d66f;
        border-radius:999px;
        padding:6px 10px;
        font-weight:700;
      }

      @media (max-width: 991.98px){
        .dhl-navbar .navbar-collapse{
          margin-top:12px;
          background:#fff8db;
          border:1px solid rgba(0,0,0,.08);
          border-radius:14px;
          padding:12px;
        }

        .dhl-menu-btn{
          display:inline-flex;
          width:100%;
          justify-content:center;
          margin-bottom:8px;
        }

        .dhl-btn-outline,
        .dhl-btn-solid{
          width:100%;
          text-align:center;
          margin-top:8px;
        }
      }

      @media (max-width: 768px){
        .page-shell,
        .flash-wrap,
        .page-footer-note{
          width:min(100%, calc(100vw - 16px));
        }

        .dhl-navbar .navbar-brand img{
          height:36px;
        }

        .dhl-brand-text strong{
          font-size:.92rem;
        }

        .dhl-brand-text small{
          font-size:.70rem;
        }

        .alert{
          padding:12px 14px;
          font-size:.95rem;
        }
      }
    </style>
</head>
<body>

    <div class="top-accent"></div>

    {% include 'navbar.html' %}

    <div class="flash-wrap">
      {% with mensagens = get_flashed_messages(with_categories=true) %}
        {% if mensagens %}
          {% for categoria, mensagem in mensagens %}
            <div class="alert alert-{{ categoria }} alert-dismissible fade show" role="alert">
              {{ mensagem }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}
    </div>

    {% block body %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
</body>
</html>
